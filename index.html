<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Handface</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ==========================
     LOGIN / REGISTER
========================== -->

<div id="authContainer" class="auth-container">

    <div class="auth-card">

        <h2 id="authTitle">Login to Handface</h2>

        <input
            type="text"
            id="authUsername"
            placeholder="Username"
            class="input"
            style="display:none;"
        >

        <input
            type="email"
            id="authEmail"
            placeholder="Email"
            class="input"
        >

        <input
            type="password"
            id="authPassword"
            placeholder="Password"
            class="input"
        >

        <button id="authSubmitBtn" class="primary-btn">
            Log In
        </button>

        <p
            id="toggleAuthMode"
            class="toggle-link"
        >
            Don't have an account? Sign Up
        </p>

    </div>

</div>

<!-- ==========================
     MAIN APPLICATION
========================== -->

<div id="appContainer" style="display:none;">

<header class="header">

    <div class="logo">
        Handface
    </div>

    <div class="header-right">

        <button
            id="searchBtn"
            class="header-btn">
            🔍
        </button>

        <button
            id="profileBtn"
            class="header-btn">
            👤
        </button>

        <button
            id="logoutBtn"
            class="logout-btn">
            Logout
        </button>

    </div>

</header>

<!-- Floating Create Post Button -->

<button
    id="globalAddContentBtn"
    class="floating-btn">
    +
</button
    <!-- ==========================
     HOME FEED
========================== -->

<main id="feedViewContainer" class="view active">

    <div id="masterFeedStream"></div>

</main>

<!-- ==========================
     PROFILE
========================== -->

<main id="profileViewContainer" class="view">

    <div class="profile-card">

        <img
            id="avatarPreview"
            src="assets/default-avatar.png"
            class="avatar"
            alt="Avatar"
        >

        <input
            type="file"
            id="avatarInput"
            accept="image/*"
        >

        <input
            id="profileName"
            type="text"
            class="input"
            placeholder="Display Name"
        >

        <button
            id="saveProfileBtn"
            class="primary-btn">
            Save Profile
        </button>

    </div>

</main>

<!-- ==========================
     MESSAGES
========================== -->

<main
    id="messagesViewPanel"
    class="view">

    <h2>Messages</h2>

    <div id="messagesContainer">
        No conversations yet.
    </div>

</main>

<!-- ==========================
     NOTIFICATIONS
========================== -->

<main
    id="notificationsViewContainer"
    class="view">

    <h2>Notifications</h2>

    <div id="notificationsContainer">
        No notifications.
    </div>

</main>

<!-- ==========================
     ADVERTISEMENTS
========================== -->

<main
    id="adViewContainer"
    class="view">

    <h2>Advertisements</h2>

    <div id="adsContainer"></div>

</main> 
    <!-- ==========================
     UPLOAD POST MODAL
========================== -->

<div id="uploadModal" class="modal">

    <div class="modal-content">

        <span id="closeModalBtn" class="close">&times;</span>

        <h2>Create Post</h2>

        <textarea
            id="postTextArea"
            placeholder="What's happening?"
            class="input"
            rows="5"></textarea>

        <input
            type="file"
            id="mediaFileInput"
            accept="image/*,video/*">

        <p id="fileNameDisplay">
            No file selected
        </p>

        <button
            id="submitPostBtn"
            class="primary-btn">
            Share Post
        </button>

    </div>

</div>

<!-- ==========================
     CREATE AD MODAL
========================== -->

<div id="adModal" class="modal">

    <div class="modal-content">

        <span id="closeAdModalBtn" class="close">&times;</span>

        <h2>Create Advertisement</h2>

        <input
            id="adBrandInput"
            class="input"
            type="text"
            placeholder="Business Name">

        <textarea
            id="adTextArea"
            class="input"
            rows="5"
            placeholder="Describe your advertisement"></textarea>

        <button
            id="submitAdBtn"
            class="primary-btn">
            Publish Advertisement
        </button>

    </div>

</div>

<!-- ==========================
     BOTTOM NAVIGATION
========================== -->

<nav class="bottom-nav">

    <button
        id="navHomeBtn"
        class="icon-btn active">
        🏠
    </button>

    <button
        id="navMessagesBtn"
        class="icon-btn">
        💬
    </button>

    <button
        id="navNotificationsBtn"
        class="icon-btn">
        🔔
    </button>

    <button
        id="navAdBtn"
        class="icon-btn">
        📢
    </button>

</nav>

<script src="app.js"></script>

</body>
</html>
